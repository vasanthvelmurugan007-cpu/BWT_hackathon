      height: 7px;

    .dot-red {
      background: #ef4444;

    }

    .dot-amber {
      background: #f59e0b;
      box-shadow: 0 0 10px rgba(245, 158, 11, .7);
    }

    .dot-blue {
      background: #60a5fa;

      background: #fb7185;

      height: 5px;
      border-radius: 999px;
      background: white;
      transition: all .3s ease;
      cursor: pointer;

    .dot-indicator.on {
      width: 28px;
      opacity: 1;
    }

      width: 8px;
      opacity: .18;
    }

    .progress-bar {
      height: 3px;
      background: rgba(255, 255, 255, .08);
      border-radius: 999px;
      overflow: hidden;
    }

      height: 100%;
      border-radius: 999px;
      transition: width .5s ease;
    }

    .scan-line {
      position: relative;
      overflow: hidden;
    }

      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(96, 165, 250, .15), transparent);

      0% {
