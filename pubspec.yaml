name: phishguard_ai
description: PhishGuard AI - MVP cybersecurity protection tool
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  tflite_flutter: ^0.10.4
  geolocator: ^12.0.0
  google_maps_flutter: ^2.6.1
  pdf: ^3.11.2
  printing: ^5.12.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
    # Place nsfw_model.tflite in assets/models/ (e.g., quantized MobileNet/OpenNSFW TFLite)
